<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <title>Riwayat Presensi</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <div>

            <div class="sidebar-header">

                <img src="assets/logo.png"
                     class="sidebar-logo">

                <h2>Monitoring PKL</h2>

            </div>

            <div class="user-box">

                <h3 id="namaUser"></h3>

                <p id="roleUser"></p>

            </div>

            <nav>

                <a
                    href="dashboard.html"
                    class="menu">

                    🏠 Dashboard

                </a>

                <a
                    href="riwayat.html"
                    class="menu active">

                    📋 Riwayat Presensi

                </a>

            </nav>

        </div>

        <button
            id="btnLogout"
            class="logout">

            Logout

        </button>

    </aside>


    <main class="content">

        <div class="header">

            <div>

                <h1>Riwayat Presensi</h1>

                <p>Monitoring PKL Jurusan Teknik Elektronika</p>

            </div>

        </div>

        <section class="toolbar">

            <div>

                <label>Tanggal Awal</label>

                <input
                    type="date"
                    id="tglAwal">

            </div>

            <div>

                <label>Tanggal Akhir</label>

                <input
                    type="date"
                    id="tglAkhir">

            </div>

            <div>

                <button
                    class="primary"
                    id="btnCari">

                    Tampilkan

                </button>

            </div>

        </section>

        <section class="table-card">

            <div class="table-responsive">

                <table id="tblRiwayat">

                    <thead>

                        <tr>

                            <th>No</th>
                            <th>Tanggal</th>
                            <th>Jam</th>
                            <th>NIS</th>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th>Tempat PKL</th>
                            <th>Status</th>
                            <th>Foto</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>


<div
    class="modal"
    id="modal">

    <div class="modal-content">

        <span id="closeModal">

            &times;

        </span>

        <img
            id="previewFoto">

    </div>

</div>


<div
    class="loading"
    id="loading"
    style="display:none;">

    <div class="spinner"></div>

    <h3>Memuat...</h3>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/riwayat.js"></script>

</body>
</html>
