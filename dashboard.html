<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard Monitoring PKL</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <!-- =========================
         SIDEBAR
    ========================== -->

    <aside class="sidebar">

        <div>

            <div class="sidebar-header">

                <img src="assets/logo.png"
                     class="sidebar-logo">

                <h2>Monitoring PKL</h2>

            </div>

            <div class="user-box">

                <h3 id="namaUser">-</h3>

                <p id="roleUser">-</p>

            </div>

            <nav>

                <a href="dashboard.html"
                   class="menu active">

                    🏠 Dashboard

                </a>

                <a href="riwayat.html"
                   class="menu">

                    📋 Riwayat Presensi

                </a>

            </nav>

        </div>

        <button
            id="btnLogout"
            class="logout">

            Logout

        </button>

    </aside>

    <!-- =========================
         CONTENT
    ========================== -->

    <main class="content">

        <div class="header">

            <div>

                <h1>Monitoring Kehadiran PKL</h1>

                <p>Jurusan Teknik Elektronika SMKN 1 Glagah</p>

            </div>

        </div>

        <!-- =========================
             CARD
        ========================== -->

        <section class="cards">

            <div class="card">

                <h3>Total Siswa</h3>

                <span id="total">0</span>

            </div>

            <div class="card hadir">

                <h3>Sudah Presensi</h3>

                <span id="hadir">0</span>

            </div>

            <div class="card belum">

                <h3>Belum Presensi</h3>

                <span id="belum">0</span>

            </div>

            <div class="card">

                <h3>Persentase</h3>

                <span id="persen">0%</span>

            </div>

        </section>

        <!-- =========================
             TOOLBAR
        ========================== -->

        <section class="toolbar">

            <div>
                <label>Tanggal</label>
                <input
                    type="date"
                    id="tanggal">
            </div>

            <div>
                <label>Pencarian</label>
                <input
                    type="text"
                    id="search"
                    placeholder="Nama, NIS, Guru, Kelas, Tempat PKL">
            </div>

            <div>
                <label>Status</label>
                <select id="filterStatus">
                    <option value="">Semua</option>
                    <option value="HADIR">Hadir</option>
                    <option value="BELUM">Belum</option>
                </select>
            </div>

            <div>
                <label>Urutkan</label>
                <select id="sortBy">
                    <option value="namaAsc">Nama A-Z</option>
                    <option value="namaDesc">Nama Z-A</option>
                    <option value="guruAsc">Guru A-Z</option>
                    <option value="guruDesc">Guru Z-A</option>
                    <option value="kelasAsc">Kelas A-Z</option>
                    <option value="kelasDesc">Kelas Z-A</option>
                    <option value="tempatAsc">Tempat PKL A-Z</option>
                    <option value="tempatDesc">Tempat PKL Z-A</option>
                    <option value="statusAsc">Status</option>
                </select>
            </div>

        </section>

        <!-- =========================
             TABLE
        ========================== -->

        <section class="table-card">

            <div class="table-responsive">

                <table id="tblMonitoring">

                    <thead>

                        <tr>

                            <th>No</th>

                            <th>NIS</th>

                            <th>Nama</th>

                            <th>Kelas</th>

                            <th>Tempat PKL</th>

                            <th>Guru</th>

                            <th>Jam</th>

                            <th>Status</th>

                            <th>Foto</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<!-- =========================
     MODAL FOTO
========================== -->

<div
    class="modal"
    id="modal">

    <div class="modal-content">

        <span id="closeModal">

            &times;

        </span>

        <img
            id="previewFoto"
            src="">

    </div>

</div>

<!-- =========================
     LOADING
========================== -->

<div
    class="loading"
    id="loading"
    style="display:none;">

    <div class="spinner"></div>

    <h3>Memuat data...</h3>

</div>

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
